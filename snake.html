<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

canvas{
display:block;
}

button{
position:fixed;
top:10px;
right:10px;
padding:10px;
background:#00c2ff;
border:none;
color:white;
border-radius:10px;
}
</style>
</head>

<body>

<button onclick="location.href='games.html'">⬅ خروج</button>

<canvas id="c"></canvas>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let box=20;

let snake=[{x:200,y:200}];
let dir="RIGHT";

let food={
x:Math.floor(Math.random()*canvas.width/box)*box,
y:Math.floor(Math.random()*canvas.height/box)*box
};

window.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft")dir="LEFT";
if(e.key==="ArrowRight")dir="RIGHT";
if(e.key==="ArrowUp")dir="UP";
if(e.key==="ArrowDown")dir="DOWN";
});

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* food */
ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,box,box);

/* head */
let head=Object.assign({},snake[0]);

if(dir==="RIGHT")head.x+=box;
if(dir==="LEFT")head.x-=box;
if(dir==="UP")head.y-=box;
if(dir==="DOWN")head.y+=box;

/* eat */
if(head.x===food.x && head.y===food.y){
food.x=Math.floor(Math.random()*canvas.width/box)*box;
food.y=Math.floor(Math.random()*canvas.height/box)*box;
}else{
snake.pop();
}

/* game over */
if(head.x<0||head.y<0||head.x>canvas.width||head.y>canvas.height){
alert("Game Over");
location.reload();
}

snake.unshift(head);

/* draw snake */
for(let i=0;i<snake.length;i++){
ctx.fillStyle=i===0?"#00c2ff":"white";
ctx.fillRect(snake[i].x,snake[i].y,box,box);
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
