<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
  color: white;
}

canvas {
  display: block;
}

.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border: 1px solid #00c2ff;
  border-radius: 10px;
}

button {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 10px;
  border: none;
  background: #00c2ff;
  color: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="hud">
⭐ Score: <span id="score">0</span>
</div>

<button onclick="location.href='games.html'">⬅ خروج</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let shipX = canvas.width / 2;

let bullets = [];
let enemies = [];

let score = 0;

/* التحكم */
window.addEventListener("mousemove", e => {
  shipX = e.clientX;
});

window.addEventListener("touchmove", e => {
  shipX = e.touches[0].clientX;
});

/* إطلاق */
window.addEventListener("click", shoot);

function shoot() {
  bullets.push({
    x: shipX,
    y: canvas.height - 80
  });
}

/* أعداء */
function spawnEnemy() {
  enemies.push({
    x: Math.random() * canvas.width,
    y: -20,
    speed: 2 + Math.random() * 2
  });
}
setInterval(spawnEnemy, 700);

/* اللعبة */
function update() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* سفينة */
  ctx.fillStyle = "#00c2ff";
  ctx.fillRect(shipX, canvas.height - 100, 30, 20);

  /* bullets */
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.y -= 7;

    ctx.fillStyle = "white";
    ctx.fillRect(b.x, b.y, 3, 10);

    if (b.y < 0) bullets.splice(i, 1);
  }

  /* enemies */
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.y += e.speed;

    ctx.fillStyle = "red";
    ctx.fillRect(e.x, e.y, 20, 20);

    /* تصادم مع اللاعب */
    if (e.y > canvas.height - 120 && Math.abs(e.x - shipX) < 25) {
      alert("💥 Game Over | Score: " + score);
      location.reload();
    }

    /* تصادم مع الرصاص */
    for (let j = bullets.length - 1; j >= 0; j--) {
      let b = bullets[j];

      if (Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) {

        enemies.splice(i, 1);
        bullets.splice(j, 1);

        score += 1;
        document.getElementById("score").innerText = score;

        break;
      }
    }

    if (e.y > canvas.height) {
      enemies.splice(i, 1);
    }
  }

  requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
