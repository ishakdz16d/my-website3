<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>اسحاق | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',sans-serif;
background:#070A12;
color:#fff;
overflow-x:hidden;
}

/* glow */
.glow{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#7c3aed,transparent 60%);
top:-150px;
right:-150px;
filter:blur(80px);
opacity:0.7;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
font-size:14px;
opacity:0.8;
}

nav ul li:hover{
color:#7c3aed;
cursor:pointer;
}

.btn{
background:linear-gradient(135deg,#7c3aed,#4f46e5);
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* HERO */
.hero{
display:grid;
grid-template-columns:1.3fr 0.7fr;
padding:60px;
align-items:center;
gap:20px;
}

.hero h1{
font-size:50px;
line-height:1.2;
}

.hero h1 span{
background:linear-gradient(90deg,#7c3aed,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
opacity:0.7;
margin-top:10px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #7c3aed;
}

/* SOCIAL */
.social{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.social div{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
font-size:13px;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:30px 60px;
}

.stat{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
text-align:center;
}

.stat h2{
color:#7c3aed;
}

/* ABOUT */
.about{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
padding:60px;
align-items:center;
}

.about img{
width:100%;
border-radius:15px;
}

/* SKILLS */
.skills{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:40px 60px;
}

.skill{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:12px;
text-align:center;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:900px){
.hero,.about{grid-template-columns:1fr;}
.stats,.skills{grid-template-columns:1fr 1fr;}
nav{padding:20px;}
.hero{padding:30px;}
.hero h1{font-size:35px;}
}
</style>
</head>

<body>

<div class="glow"></div>

<nav>
<h3>اسحاق</h3>
<ul>
<li>الرئيسية</li>
<li>المهارات</li>
<li>المشاريع</li>
<li>تواصل</li>
</ul>
<button class="btn">تواصل معي</button>
</nav>

<section class="hero">

<div>
<h1>مرحباً 👋 أنا <span>اسحاق</span></h1>
<p>مطور واجهات حديثة وتصميم مواقع احترافية</p>
<br>
<button class="btn">مشاريعي</button>
</div>

<div class="card">
<img class="avatar" src="https://via.placeholder.com/120">

<h3>اسحاق</h3>
<p>Frontend Developer</p>

<div class="social">
<div><span>Discord</span><span>is7_9</span></div>
<div><span>Instagram</span><span>dz16d</span></div>
</div>

</div>

</section>

<section class="stats">
<div class="stat"><h2>10+</h2><p>مشاريع</p></div>
<div class="stat"><h2>200+</h2><p>ساعات</p></div>
<div class="stat"><h2>1+</h2><p>سنة خبرة</p></div>
<div class="stat"><h2>100%</h2><p>شغف</p></div>
</section>

<section class="about">

<div>
<h2>من أنا؟</h2>
<p>
أنا مطور مواقع أصمم واجهات حديثة وسريعة وتجربة مستخد
