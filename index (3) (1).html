<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسحاق | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:"Cairo", sans-serif;
    background:#05060a;
    color:white;
    overflow-x:hidden;
}

/* 🌌 glow bg */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(138,92,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,0,120,0.10), transparent 50%);
    z-index:-1;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

nav a{
    margin:0 10px;
    color:#aaa;
    text-decoration:none;
}

nav a:hover{color:white}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px 80px;
    gap:40px;
}

.hero h1{
    font-size:70px;
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin:0;
}

.hero p{color:#bbb;max-width:450px}

.btn{
    padding:12px 18px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
}

.primary{
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    color:white;
}

.secondary{
    border:1px solid #333;
    color:white;
}

/* CARD */
.card{
    width:300px;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(15px);
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    border:3px solid #7b61ff;
    overflow:hidden;
    margin:auto;
}

.avatar img{width:100%}

.social a{
    display:block;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    text-decoration:none;
    color:white;
}

/* 🎵 music button */
.music{
    position:fixed;
    bottom:20px;
    left:20px;
}

#musicBtn{
    padding:12px 15px;
    border-radius:12px;
    border:none;
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    color:white;
    cursor:pointer;
    font-weight:600;
}
</style>
</head>

<body>

<nav>
    <div>
        <a href="#">الرئيسية</a>
        <a href="#">عنّي</a>
        <a href="#">المهارات</a>
        <a href="#">المشاريع</a>
    </div>
</nav>

<div class="hero">

<div>
<p>👋 مرحباً بك في موقعي</p>
<h1>اسحاق</h1>
<p>مطور مواقع أتعلم وأبني مشاريع حديثة.</p>

<a class="btn primary">تواصل معي</a>
<a class="btn secondary">أعمالي</a>
</div>

<div class="card">
<div class="avatar">
<img src="https://cdn.discordapp.com/embed/avatars/0.png">
</div>

<h3 style="text-align:center;">اسحاق</h3>

<div class="social">
<a href="#">💬 Discord</a>
<a href="#">📸 Instagram</a>
</div>
</div>

</div>

<!-- 🎵 MUSIC PLAYER -->
<div class="music">
<button id="musicBtn">🎵 تشغيل الموسيقى</button>
</div>

<audio id="audio" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3d6b5.mp3?filename=ambient-piano-amp-strings-10711.mp3" type="audio/mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("musicBtn");

let playing = false;

btn.onclick = () => {
    if(!playing){
        audio.play();
        btn.innerText = "⏸ إيقاف الموسيقى";
    } else {
        audio.pause();
        btn.innerText = "🎵 تشغيل الموسيقى";
    }
    playing = !playing;
};
</script>

</body>
</html>
