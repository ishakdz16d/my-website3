<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7aq Ultimate Space Site</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
color:white;
}

/* 🌌 stars */
canvas{
position:fixed;
top:0;
left:0;
}

/* 🧑‍💻 MAIN CARD */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(20,20,40,0.75);
border:1px solid #00c2ff;
padding:25px;
border-radius:20px;
width:92%;
max-width:380px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:0 0 25px #00c2ff33;
}

h1{
margin:0;
color:#00c2ff;
}

/* 🌐 socials */
.social{
display:flex;
flex-direction:column;
gap:8px;
margin-top:10px;
}

a{
text-decoration:none;
color:white;
}

.link{
padding:10px;
border-radius:10px;
border:1px solid #00c2ff;
background:rgba(255,255,255,0.05);
}

/* buttons */
button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c2ff,#0055ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* HUD */
.hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border:1px solid #00c2ff;
border-radius:10px;
display:none;
}

/* SHOP */
.shop{
position:fixed;
right:10px;
top:10px;
background:rgba(0,0,0,0.5);
border:1px solid #00c2ff;
padding:10px;
border-radius:10px;
display:none;
width:140px;
}

/* GAME */
#game{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🧑‍💻 PROFILE -->
<div class="card" id="menu">
<h1>👨‍💻 Is7aq</h1>
<p>🇩🇿 Developer from Algeria</p>
<p>🚀 Space & Web Creator</p>

<!-- 🌐 SOCIAL -->
<div class="social">
<a class="link" href="https://discord.com" target="_blank">💬 Discord: is7_9</a>
<a class="link" href="https://instagram.com" target="_blank">📸 Instagram: dz16d</a>
<a class="link" href="https://github.com" target="_blank">💻 GitHub</a>
</div>

<button onclick="startGame()">🚀 دخول اللعبة</button>
</div>

<!-- HUD -->
<div class="hud" id="hud">
⭐ Score: <span id="score">0</span><br>
🔫 Power: <span id="power">1</span>
</div>

<!-- SHOP -->
<div class="shop" id="shop">
🛒 Shop<br>
<button onclick="buyPower()">+ Power (10⭐)</button>
</div>

<!-- GAME -->
<canvas id="game"></canvas>

<script>

/* 🌌 STAR BACKGROUND */
const bg=document.getElementById("bg");
const bctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({x:Math.random()*bg.width,y:Math.random()*bg.height});
}

function drawBg(){
bctx.clearRect(0,0,bg.width,bg.height);
bctx.fillStyle="white";

for(let s of stars){
s.y+=0.4;
if(s.y>bg.height)s.y=0;
bctx.fillRect(s.x,s.y,2,2);
}
}
setInterval(drawBg,30);

/* 🎮 GAME */
const c=document.getElementById("game");
const g=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let ship={x:c.width/2,y:c.height-120,hp:100};

let bullets=[];
let enemies=[];
let boss=null;

let score=0;
let power=1;

/* START */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("shop").style.display="block";
c.style.display="block";
}

/* CONTROL */
window.addEventListener("mousemove",e=>{
ship.x=e.clientX;
});

/* SHOOT */
window.addEventListener("click",()=>{
if(c.style.display==="block"){
bullets.push({x:ship.x,y:ship.y});
}
});

/* ENEMIES */
setInterval(()=>{
if(c.style.display==="block"){
enemies.push({
x:Math.random()*c.width,
y:-20,
s:2+Math.random()*2,
type:Math.floor(Math.random()*3)
});
}
},600);

/* BOSS */
setTimeout(()=>{
boss={x:c.width/2,y:80,hp:60};
},15000);

/* SHOP */
function buyPower(){
if(score>=10){
score-=10;
power++;
update();
}
}

function update(){
document.getElementById("score").innerText=score;
document.getElementById("power").innerText=power;
}

/* LOOP */
function loop(){

if(c.style.display==="block"){

g.clearRect(0,0,c.width,c.height);

/* 🚀 ship */
g.fillStyle="#00c2ff";
g.beginPath();
g.moveTo(ship.x,ship.y);
g.lineTo(ship.x-15,ship.y+30);
g.lineTo(ship.x+15,ship.y+30);
g.fill();

/* bullets */
for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.y-=8*power;

g.fillStyle="white";
g.fillRect(b.x,b.y,3,10);
}

/* enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=e.s;

/* shapes */
if(e.type===0)g.fillStyle="red";
if(e.type===1)g.fillStyle="orange";
if(e.type===2)g.fillStyle="purple";

g.fillRect(e.x,e.y,20,20);

/* hit */
for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

enemies.splice(i,1);
bullets.splice(j,1);

score++;
update();
break;
}
}

/* player hit */
if(e.y>ship.y && Math.abs(e.x-ship.x)<20){
ship.hp-=10;
if(ship.hp<=0){
alert("💥 Game Over | Score: "+score);
location.reload();
}
}
}

/* 👑 BOSS */
if(boss){

g.fillStyle="purple";
g.fillRect(boss.x,boss.y,90,40);

for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(b.x>boss.x && b.x<boss.x+90 && b.y<boss.y+40){
boss.hp--;
bullets.splice(j,1);

if(boss.hp<=0){
score+=20;
update();
boss=null;
}
}
}
}

}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
