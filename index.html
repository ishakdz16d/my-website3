<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Space Profile</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* 🌌 خلفية */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* 🧠 عنوان نيون */
.neon {
  color: #00c2ff;
  text-shadow: 0 0 5px #00c2ff, 0 0 15px #00c2ff, 0 0 30px #0088ff;
}

/* 🎮 HUD */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #00c2ff;
  backdrop-filter: blur(6px);
}

/* 🎯 Radar */
.radar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid #00c2ff;
  overflow: hidden;
  z-index: 10;
}

.radar::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: conic-gradient(from 0deg, transparent, rgba(0,194,255,0.4));
  animation: spin 3s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* 🧑‍🚀 وسط */
.center {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 5;
}

/* 📦 مربع */
.app {
  margin: 10px 0;
  width: 90%;
  max-width: 320px;

  background: rgba(255,255,255,0.05);
  border-radius: 18px;
  padding: 15px;

  border: 1px solid rgba(0,194,255,0.4);
  box-shadow: 0 0 15px rgba(0,194,255,0.2);

  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.app:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,194,255,0.5);
}

/* 🔘 زر داخل المربع */
.app-btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;

  border: none;
  border-radius: 12px;

  background: rgba(0,0,0,0.4);
  color: white;

  cursor: pointer;
  transition: 0.3s;
}

.app-btn:hover {
  background: rgba(0,194,255,0.25);
}

/* 🔷 شعار */
.logo {
  width: 60px;
  height: 60px;
  border-radius: 15px;
  border: 2px solid #00c2ff;
  margin: auto;
  display: block;
}

/* 📌 الأعلى */
.top {
  position: fixed;
  top: 10px;
  width: 100%;
  display: flex;
  justify-content: center;
  z-index: 10;
}

/* 📌 الأسفل */
.bottom {
  position: fixed;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: center;
  z-index: 10;
}

/* 🎵 زر موسيقى */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 20;

  padding: 12px 16px;
  border: none;
  border-radius: 12px;

  background: #00c2ff;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px #00c2ff;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<!-- 🎮 HUD -->
<div class="hud">👨‍🚀 SPACE MODE ACTIVE</div>

<!-- 🎯 Radar -->
<div class="radar"></div>

<!-- 🔼 Discord -->
<div class="top">
  <div class="app">
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    <button class="app-btn" onclick="openDiscord()">💬 Discord: is7_9</button>
  </div>
</div>

<!-- 🧑‍🚀 وسط -->
<div class="center">

  <h1 class="neon">🚀 Cyber Space Profile</h1>

  <div class="app">
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
    <button class="app-btn" onclick="openInstagram()">📸 Instagram: dz16d</button>
  </div>

</div>

<!-- 🔽 Game -->
<div class="bottom">
  <div class="app">
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
    <button class="app-btn">🎮 Game Zone</button>
  </div>
</div>

<!-- 🎵 موسيقى -->
<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<script>

/* 🎵 موسيقى */
const music = document.getElementById("music");
let playing = false;

function toggleMusic(){
  if(!playing){
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* 🔗 روابط */
function openDiscord(){
  window.open("https://discord.com/users/is7_9","_blank");
}

function openInstagram(){
  window.open("https://instagram.com/dz16d","_blank");
}

/* 🌌 نجوم + ماوس */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shooting = [];
let mouse = { x: 0, y: 0 };

for(let i=0;i<250;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5
  });
}

window.addEventListener("mousemove",(e)=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* شهب */
function shoot(){
  shooting.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height/2,
    len: 80,
    speed: 6
  });
}

setInterval(shoot,2500);

/* رسم */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // stars
  ctx.fillStyle="white";

  stars.forEach(s=>{
    let dx = (mouse.x - canvas.width/2)*0.002;
    let dy = (mouse.y - canvas.height/2)*0.002;

    ctx.beginPath();
    ctx.arc(s.x+dx,s.y+dy,s.r,0,Math.PI*2);
    ctx.fill();
  });

  // shooting stars
  for(let i=0;i<shooting.length;i++){
    let s = shooting[i];

    ctx.beginPath();
    ctx.strokeStyle="#00c2ff";
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x+s.len,s.y+s.len);
    ctx.stroke();

    s.x += s.speed;
    s.y += s.speed;

    if(s.x>canvas.width){
      shooting.splice(i,1);
    }
  }
}

function animate(){
  draw();
  requestAnimationFrame(animate);
}

animate();

/* resize */
window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
