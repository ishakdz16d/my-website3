<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7aq Space Site</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* 🌌 الخلفية */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 🧑‍💻 الكارد */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(255,255,255,0.06);
  border: 1px solid #00c2ff;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  backdrop-filter: blur(10px);
  z-index: 10;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #00c2ff;
  color: white;
  cursor: pointer;
}

/* 🎮 اللعبة */
#game {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 20;
}

/* 🎵 زر الموسيقى */
.music {
  position: fixed;
  bottom: 15px;
  left: 15px;
  z-index: 30;
}

/* 🔙 زر الرجوع */
.back {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 30;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🧑‍💻 التعريف -->
<div class="card">
  <h2>👨‍💻 اسحاق</h2>
  <p>🇩🇿 من الجزائر</p>
  <p>💻 أحب البرمجة وصناعة المواقع</p>

  <button onclick="window.open('https://discord.com','_blank')">💬 Discord</button>
  <button onclick="window.open('https://instagram.com','_blank')">📸 Instagram</button>

  <button onclick="openGame()">🎮 دخول اللعبة</button>
</div>

<!-- 🎵 موسيقى -->
<button class="music" onclick="toggleMusic()">🎵 Music</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<!-- 🎮 اللعبة -->
<canvas id="game"></canvas>
<button class="back" onclick="closeGame()">⬅ رجوع</button>

<script>

/* 🌌 نجوم */
const bg = document.getElementById("bg");
const ctx = bg.getContext("2d");

bg.width = window.innerWidth;
bg.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*bg.width,
    y: Math.random()*bg.height
  });
}

function draw(){
  ctx.clearRect(0,0,bg.width,bg.height);
  ctx.fillStyle="white";

  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,1.5,1.5);
  });
}
setInterval(draw,50);

/* 🎵 موسيقى */
let music = document.getElementById("music");
let play = false;

function toggleMusic(){
  if(!play){
    music.play();
    play = true;
  } else {
    music.pause();
    play = false;
  }
}

/* 🎮 فتح اللعبة */
function openGame(){
  document.querySelector(".card").style.display="none";
  document.getElementById("game").style.display="block";
}

/* 🔙 إغلاق اللعبة */
function closeGame(){
  document.querySelector(".card").style.display="block";
  document.getElementById("game").style.display="none";
}

/* 🎮 لعبة */
const game = document.getElementById("game");
const g = game.getContext("2d");

game.width = window.innerWidth;
game.height = window.innerHeight;

let x = game.width/2;
let bullets = [];
let enemies = [];

/* تحكم */
window.addEventListener("mousemove",e=>x=e.clientX);
window.addEventListener("touchmove",e=>x=e.touches[0].clientX);

/* إطلاق */
window.addEventListener("click",()=>{
  if(game.style.display==="block"){
    bullets.push({x:x,y:game.height-80});
  }
});

/* أعداء */
setInterval(()=>{
  if(game.style.display==="block"){
    enemies.push({
      x: Math.random()*game.width,
      y: 0,
      speed: 2
    });
  }
},800);

/* تحديث */
function update(){

  if(game.style.display==="block"){

    g.clearRect(0,0,game.width,game.height);

    /* سفينة */
    g.fillStyle="#00c2ff";
    g.fillRect(x,game.height-100,30,20);

    /* bullets */
    for(let i=0;i<bullets.length;i++){
      let b = bullets[i];
      b.y -= 6;

      g.fillStyle="white";
      g.fillRect(b.x,b.y,3,10);

      if(b.y<0) bullets.splice(i,1);
    }

    /* enemies */
    for(let i=0;i<enemies.length;i++){
      let e = enemies[i];
      e.y += e.speed;

      g.fillStyle="red";
      g.fillRect(e.x,e.y,20,20);

      if(e.y>game.height-120 && Math.abs(e.x-x)<25){
        alert("💥 Game Over");
        location.reload();
      }
    }
  }

  requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
