<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقعي الفضائي</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* المحتوى */
.content {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* العنوان */
h1 {
  font-size: 40px;
}

/* الأزرار */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #00c2ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* السوشيال */
.social {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.box {
  display: flex;
  align-items: center;
  gap: 15px;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 15px;
}

.box img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid white;
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<div class="content">

<h1>✨ مرحبا بك في السماء</h1>
<p>نجوم + شهب + موسيقى + روابط</p>

<button onclick="toggleMusic()">▶ تشغيل الموسيقى</button>

<!-- روابط -->
<div class="social">

  <div class="box">
    <img src="https://placekitten.com/80/80">
    <button onclick="openDiscord()">💬 Discord: is7_9</button>
  </div>

  <div class="box">
    <img src="https://placekitten.com/81/81">
    <button onclick="openInstagram()">📸 Instagram: dz16d</button>
  </div>

</div>

</div>

<!-- 🎵 موسيقى -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<script>

/* ========== الموسيقى ========== */
const music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* ========== الروابط ========== */
function openDiscord() {
  window.open("https://discord.com/users/is7_9", "_blank");
}

function openInstagram() {
  window.open("https://instagram.com/dz16d", "_blank");
}

/* ========== النجوم ========== */
const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shooting = [];

/* نجوم */
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5
  });
}

/* شهاب */
function createShooting() {
  shooting.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height / 2,
    len: 80,
    speed: 8
  });
}

setInterval(createShooting, 2500);

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* نجوم */
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  /* شهب */
  for (let i = 0; i < shooting.length; i++) {
    let s = shooting[i];

    ctx.beginPath();
    ctx.strokeStyle = "white";
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.len, s.y + s.len);
    ctx.stroke();

    s.x += s.speed;
    s.y += s.speed;

    if (s.x > canvas.width) {
      shooting.splice(i,1);
    }
  }
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();

/* resize */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
