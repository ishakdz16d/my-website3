<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسحاق | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:"Cairo", sans-serif;
    background:#05060a;
    color:white;
}

/* خلفية glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(138,92,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 40%);
    z-index:-1;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

nav a{
    color:#aaa;
    margin:0 10px;
    text-decoration:none;
}

nav a:hover{color:white}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px;
    flex-wrap:wrap;
}

.hero h1{
    font-size:60px;
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{color:#bbb}

/* buttons */
.btn{
    padding:10px 15px;
    border-radius:10px;
    text-decoration:none;
}

.primary{
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    color:white;
}

.secondary{
    border:1px solid #333;
    color:white;
}

/* card */
.card{
    width:280px;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:20px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
}

.avatar img{width:100%}

/* stats */
.stats{
    display:flex;
    justify-content:space-around;
    padding:30px;
}

.stat{text-align:center}

/* music */
.music{
    position:fixed;
    bottom:20px;
    left:20px;
}

#musicBtn{
    padding:10px;
    border-radius:10px;
    background:#7b61ff;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div>
<a href="#">الرئيسية</a>
<a href="#">عنّي</a>
<a href="#">المهارات</a>
<a href="#">المشاريع</a>
</div>
</nav>

<div class="hero">

<div>
<p>👋 مرحباً</p>
<h1>اسحاق</h1>
<p>مطور مواقع أتعلم وأبني مشاريع حديثة.</p>

<a class="btn primary">تواصل</a>
<a class="btn secondary">أعمالي</a>
</div>

<div class="card">
<div class="avatar">
<img src="https://cdn.discordapp.com/embed/avatars/0.png">
</div>

<h3 style="text-align:center;">اسحاق</h3>

<p style="text-align:center;color:#aaa;">مطور مبتدئ</p>
</div>

</div>

<div class="stats">
<div class="stat"><h2>10+</h2><p>مشاريع</p></div>
<div class="stat"><h2>200+</h2><p>ساعة</p></div>
<div class="stat"><h2>1+</h2><p>سنة</p></div>
</div>

<!-- 🎵 MUSIC -->
<div class="music">
<button id="musicBtn">🎵 تشغيل</button>
</div>

<audio id="audio" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3d6b5.mp3?filename=ambient-piano-amp-strings-10711.mp3" type="audio/mp3">
</audio>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("musicBtn");

let play=false;

btn.onclick=()=>{
if(!play){
audio.play();
btn.innerText="⏸ إيقاف";
}else{
audio.pause();
btn.innerText="🎵 تشغيل";
}
play=!play;
}
</script>

</body>
</html>
