<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقعي الفضائي</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  color: white;

  background: radial-gradient(circle at top,
    #1a1a40 0%,
    #0a0a1f 50%,
    #000 100%);
}

/* 🌌 مجرة خفيفة */
.galaxy {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://i.imgur.com/3e5YL4X.png");
  background-size: cover;
  opacity: 0.25;
  z-index: -2;
}

/* النجوم */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* المحتوى */
.content {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 42px;
}

p {
  opacity: 0.8;
}

/* زر */
.main-btn {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #00c2ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* روابط */
.social {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 350px;
}

.box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.06);
  padding: 10px;
  border-radius: 15px;
}

.box img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 2px solid white;
}

.box button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: white;
  cursor: pointer;
}

/* 📱 الهاتف */
@media (max-width: 600px) {
  h1 {
    font-size: 28px;
  }

  .main-btn {
    width: 80%;
    font-size: 14px;
  }

  .box {
    flex-direction: row;
  }
}

/* 💻 الكمبيوتر */
@media (min-width: 1000px) {
  h1 {
    font-size: 50px;
  }

  .social {
    max-width: 420px;
  }
}
</style>
</head>

<body>

<div class="galaxy"></div>
<canvas id="sky"></canvas>

<div class="content">

<h1>✨ سماء هادئة</h1>
<p>يعمل على الهاتف والكمبيوتر</p>

<button class="main-btn" onclick="toggleMusic()">▶ تشغيل الموسيقى</button>

<div class="social">

  <div class="box">
    <img src="https://placekitten.com/80/80">
    <button onclick="openDiscord()">💬 Discord: is7_9</button>
  </div>

  <div class="box">
    <img src="https://placekitten.com/81/81">
    <button onclick="openInstagram()">📸 Instagram: dz16d</button>
  </div>

</div>

</div>

<!-- 🎵 موسيقى -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<script>

/* 🎵 موسيقى */
const music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* 🔗 روابط */
function openDiscord() {
  window.open("https://discord.com/users/is7_9", "_blank");
}

function openInstagram() {
  window.open("https://instagram.com/dz16d", "_blank");
}

/* 🌌 نجوم */
const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
let shooting = [];

/* نجوم */
for (let i = 0; i < 180; i++) {
  stars.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5
  });
}

/* شهب */
function createShooting() {
  shooting.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight / 2,
    len: 70,
    speed: 6 + Math.random() * 4
  });
}

setInterval(createShooting, 3000);

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* نجوم */
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  /* شهب */
  for (let i = 0; i < shooting.length; i++) {
    let s = shooting[i];

    ctx.beginPath();
    ctx.strokeStyle = "white";
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.len, s.y + s.len);
    ctx.stroke();

    s.x += s.speed;
    s.y += s.speed;

    if (s.x > canvas.width || s.y > canvas.height) {
      shooting.splice(i,1);
    }
  }
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
