<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7aq Game Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 🧑‍💻 الكارد */
.card {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.06);
  border: 1px solid #00c2ff;
  padding: 15px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  backdrop-filter: blur(10px);
  z-index: 10;
}

/* 🎮 اللعبة */
#game {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 250px;
  z-index: 5;
  background: rgba(0,0,0,0.2);
  border-top: 1px solid #00c2ff;
}

/* 🛒 المتجر */
.shop {
  position: fixed;
  right: 10px;
  top: 10px;
  width: 180px;
  background: rgba(0,0,0,0.6);
  border: 1px solid #00c2ff;
  padding: 10px;
  border-radius: 15px;
  z-index: 20;
}

button {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #00c2ff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🧑‍💻 التعريف -->
<div class="card">
  <h2>👨‍💻 اسحاق</h2>
  <p>🇩🇿 من الجزائر</p>
  <p>💻 Game + Web Developer</p>
</div>

<!-- 🛒 المتجر -->
<div class="shop">
  🛒 Shop<br>
  ⭐ Points: <span id="points">0</span><br>
  💥 Damage: <span id="damage">1</span>

  <button onclick="buyDamage()">Upgrade +1 (10⭐)</button>
</div>

<!-- 🎮 اللعبة -->
<canvas id="game"></canvas>

<script>

/* 🌌 خلفية */
const bg = document.getElementById("bg");
const ctx = bg.getContext("2d");

bg.width = window.innerWidth;
bg.height = window.innerHeight;

let stars = [];
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*bg.width,y:Math.random()*bg.height});
}

function drawBg(){
  ctx.clearRect(0,0,bg.width,bg.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,1.5,1.5);
  });
}
setInterval(drawBg,50);

/* 🎮 اللعبة */
const game = document.getElementById("game");
const g = game.getContext("2d");

game.width = window.innerWidth;
game.height = 250;

let x = game.width/2;
let bullets = [];
let enemies = [];

let points = 0;
let damage = 1;

/* التحكم */
window.addEventListener("mousemove",e=>x=e.clientX);
window.addEventListener("touchmove",e=>x=e.touches[0].clientX);

/* إطلاق */
window.addEventListener("click",()=>{
  bullets.push({x:x,y:game.height-60});
});

/* أعداء */
setInterval(()=>{
  enemies.push({
    x: Math.random()*game.width,
    y: 0,
    speed: 2
  });
},800);

/* 🛒 متجر */
function buyDamage(){
  if(points >= 10){
    points -= 10;
    damage++;
    updateUI();
  }
}

/* تحديث UI */
function updateUI(){
  document.getElementById("points").innerText = points;
  document.getElementById("damage").innerText = damage;
}

/* اللعبة */
function update(){

  g.clearRect(0,0,game.width,game.height);

  /* سفينة */
  g.fillStyle="#00c2ff";
  g.fillRect(x,game.height-80,30,20);

  /* bullets */
  for(let i=0;i<bullets.length;i++){
    let b = bullets[i];
    b.y -= 6;

    g.fillStyle="white";
    g.fillRect(b.x,b.y,3,10);

    if(b.y<0) bullets.splice(i,1);
  }

  /* enemies */
  for(let i=0;i<enemies.length;i++){
    let e = enemies[i];
    e.y += e.speed;

    g.fillStyle="red";
    g.fillRect(e.x,e.y,20,20);

    /* تصادم */
    if(e.y>160 && Math.abs(e.x-x)<25){
      alert("💥 Game Over | Points: "+points);
      location.reload();
    }

    /* bullets hit */
    for(let j=0;j<bullets.length;j++){
      let b = bullets[j];

      if(Math.abs(b.x-e.x)<25 && Math.abs(b.y-e.y)<25){

        enemies.splice(i,1);
        bullets.splice(j,1);

        points += damage; // ⭐ نقاط حسب الضرر
        updateUI();

        break;
      }
    }
  }

  requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
