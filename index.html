<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS7AQ SPACE - FINAL</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

/* 🌌 BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
}

/* 🧑‍💻 PROFILE */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(20,20,40,0.8);
border:1px solid #00c2ff;
padding:25px;
border-radius:20px;
width:92%;
max-width:380px;
text-align:center;
backdrop-filter:blur(10px);
}

h1{
color:#00c2ff;
margin:0;
}

/* LINKS */
a{
display:block;
margin-top:8px;
padding:10px;
border:1px solid #00c2ff;
border-radius:10px;
color:white;
text-decoration:none;
background:rgba(255,255,255,0.05);
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c2ff,#0044ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* HUD */
.hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border:1px solid #00c2ff;
border-radius:10px;
display:none;
}

/* GAME OVER */
.over{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.9);
font-size:30px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<!-- 🧑‍💻 PROFILE -->
<div class="card" id="menu">

<h1>👨‍💻 IS7AQ</h1>
<p>🇩🇿 Developer from Algeria</p>
<p>🚀 Space Game + Portfolio</p>

<!-- 🌐 SOCIAL -->
<a href="https://discord.com" target="_blank">💬 Discord: is7_9</a>
<a href="https://instagram.com" target="_blank">📸 Instagram: dz16d</a>

<button onclick="startGame()">🚀 Start Game</button>
</div>

<!-- HUD -->
<div class="hud" id="hud">
❤️ HP: <span id="hp">100</span><br>
⭐ Score: <span id="score">0</span><br>
🗺️ Level: <span id="level">1</span>
</div>

<!-- GAME OVER -->
<div class="over" id="over">
💥 GAME OVER<br>
<button onclick="location.reload()">Restart</button>
</div>

<script>

/* 🌌 STARS */
const bg=document.getElementById("bg");
const b=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({x:Math.random()*bg.width,y:Math.random()*bg.height});
}

function draw(){
b.clearRect(0,0,bg.width,bg.height);
b.fillStyle="white";

for(let s of stars){
s.y+=0.4;
if(s.y>bg.height)s.y=0;
b.fillRect(s.x,s.y,2,2);
}
}
setInterval(draw,30);

/* 🎮 GAME */
const c=document.getElementById("game");
const g=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

/* PLAYER */
let ship={
x:c.width/2,
y:c.height-120,
hp:100,
shield:true
};

let bullets=[];
let enemies=[];
let boss=null;

let score=0;
let level=1;

/* START */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";

/* shield 3 sec */
setTimeout(()=>ship.shield=false,3000);
}

/* CONTROL */
window.addEventListener("mousemove",e=>{
ship.x=e.clientX;
});

/* SHOOT */
window.addEventListener("click",()=>{
bullets.push({x:ship.x,y:ship.y});
});

/* ENEMIES (difficulty increases) */
setInterval(()=>{
enemies.push({
x:Math.random()*c.width,
y:-20,
speed:2+level*0.5
});
},600);

/* LEVEL SYSTEM */
setInterval(()=>{
level++;
document.getElementById("level").innerText=level;
},20000);

/* BOSS */
setTimeout(()=>{
boss={x:c.width/2,y:80,hp:80};
},15000);

/* HUD UPDATE */
function update(){
document.getElementById("hp").innerText=ship.hp;
document.getElementById("score").innerText=score;
}

/* LOOP */
function loop(){

g.clearRect(0,0,c.width,c.height);

/* ship */
g.fillStyle="#00c2ff";
g.beginPath();
g.moveTo(ship.x,ship.y);
g.lineTo(ship.x-15,ship.y+30);
g.lineTo(ship.x+15,ship.y+30);
g.fill();

/* bullets */
for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.y-=10;

g.fillStyle="white";
g.fillRect(b.x,b.y,3,10);
}

/* enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=e.speed;

g.fillStyle="red";
g.fillRect(e.x,e.y,20,20);

/* hit */
for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
enemies.splice(i,1);
bullets.splice(j,1);

score++;
update();
break;
}
}

/* player hit */
if(e.y>ship.y && Math.abs(e.x-ship.x)<25){

if(!ship.shield){
ship.hp-=20;
update();
}

if(ship.hp<=0){
document.getElementById("over").style.display="flex";
}
}
}

/* BOSS */
if(boss){
g.fillStyle="purple";
g.fillRect(boss.x,boss.y,120,50);

for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(b.x>boss.x && b.x<boss.x+120 && b.y<boss.y+50){
boss.hp--;
bullets.splice(j,1);

if(boss.hp<=0){
score+=50;
boss=null;
update();
}
}
}
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
