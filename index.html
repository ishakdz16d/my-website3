<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7aq Full Site</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* 🌌 الخلفية */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* 🧑‍💻 الكارد */
.card {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;

  background: rgba(255,255,255,0.06);
  border: 1px solid #00c2ff;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  backdrop-filter: blur(10px);
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #00c2ff;
  color: white;
  cursor: pointer;
}

/* 🎮 قائمة الألعاب */
#menu {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 20;
  text-align: center;
  padding-top: 80px;
}

.gameBtn {
  width: 80%;
  max-width: 300px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 12px;
  background: #00c2ff;
  border: none;
  color: white;
}

/* 🎮 اللعبة */
#game {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 30;
}

.back {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 40;
  padding: 10px;
  background: #00c2ff;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🧑‍💻 التعريف -->
<div class="card">
  <h2>👨‍💻 اسحاق</h2>
  <p>🇩🇿 من الجزائر</p>
  <p>💻 أحب البرمجة وصناعة المواقع</p>

  <button onclick="window.open('https://discord.com','_blank')">💬 Discord</button>
  <button onclick="window.open('https://instagram.com','_blank')">📸 Instagram</button>

  <button onclick="openMenu()">🎮 الألعاب</button>
</div>

<!-- 🎮 قائمة الألعاب -->
<div id="menu">
  <h2>🎮 قائمة الألعاب</h2>

  <button class="gameBtn" onclick="startGame()">🚀 لعبة الفضاء</button>
  <button class="gameBtn" onclick="closeMenu()">⬅ رجوع</button>
</div>

<!-- 🎮 اللعبة -->
<canvas id="game"></canvas>
<button class="back" onclick="exitGame()">⬅ خروج</button>

<script>

/* 🌌 نجوم */
const bg = document.getElementById("bg");
const ctx = bg.getContext("2d");

bg.width = window.innerWidth;
bg.height = window.innerHeight;

let stars = [];

for(let i=0;i<120;i++){
  stars.push({
    x: Math.random()*bg.width,
    y: Math.random()*bg.height
  });
}

function draw(){
  ctx.clearRect(0,0,bg.width,bg.height);
  ctx.fillStyle="white";

  stars.forEach(s=>{
    ctx.fillRect(s.x,s.y,1.5,1.5);
  });
}

setInterval(draw,50);

/* 🎮 menu */
function openMenu(){
  document.getElementById("menu").style.display="block";
}
function closeMenu(){
  document.getElementById("menu").style.display="none";
}

/* 🚀 لعبة */
const game = document.getElementById("game");
const g = game.getContext("2d");

game.width = window.innerWidth;
game.height = window.innerHeight;

let x = game.width/2;
let bullets = [];
let enemies = [];

function startGame(){
  document.getElementById("menu").style.display="none";
  game.style.display="block";
}

/* خروج */
function exitGame(){
  game.style.display="none";
}

/* تحكم */
window.addEventListener("mousemove",e=>x=e.clientX);
window.addEventListener("touchmove",e=>x=e.touches[0].clientX);

/* إطلاق */
window.addEventListener("click",()=>{
  if(game.style.display==="block"){
    bullets.push({x:x,y:game.height-60});
  }
});

/* أعداء */
setInterval(()=>{
  if(game.style.display==="block"){
    enemies.push({
      x: Math.random()*game.width,
      y: 0,
      speed: 2
    });
  }
},800);

/* تحديث */
function update(){

  if(game.style.display==="block"){

    g.clearRect(0,0,game.width,game.height);

    /* سفينة */
    g.fillStyle="#00c2ff";
    g.fillRect(x,game.height-80,30,20);

    /* bullets */
    for(let i=0;i<bullets.length;i++){
      let b = bullets[i];
      b.y -= 6;

      g.fillStyle="white";
      g.fillRect(b.x,b.y,3,10);

      if(b.y<0) bullets.splice(i,1);
    }

    /* enemies */
    for(let i=0;i<enemies.length;i++){
      let e = enemies[i];
      e.y += e.speed;

      g.fillStyle="red";
      g.fillRect(e.x,e.y,20,20);

      if(e.y>160 && Math.abs(e.x-x)<25){
        alert("💥 Game Over");
        location.reload();
      }
    }

  }

  requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
