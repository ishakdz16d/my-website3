<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS7AQ SPACE AAA</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* 🌌 CANVAS */
canvas{
position:fixed;
top:0;
left:0;
}

/* 🎬 START SCREEN */
.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#0a0a2a,#000);
text-align:center;
}

.title{
font-size:40px;
color:#00c2ff;
text-shadow:0 0 20px #00c2ff;
}

.btn{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c2ff,#0044ff);
color:white;
font-size:18px;
cursor:pointer;
}

/* HUD */
.hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border:1px solid #00c2ff;
border-radius:10px;
display:none;
}

/* SHOP */
.shop{
position:fixed;
right:10px;
top:10px;
background:rgba(0,0,0,0.5);
border:1px solid #00c2ff;
padding:10px;
border-radius:10px;
display:none;
width:140px;
}

/* GAME OVER */
.over{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.9);
font-size:30px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<!-- START -->
<div class="screen" id="menu">
<div class="title">🚀 IS7AQ SPACE AAA</div>
<p>Ultimate Web Space Game</p>
<button class="btn" onclick="start()">▶ Start Mission</button>
</div>

<!-- HUD -->
<div class="hud" id="hud">
⭐ Score: <span id="score">0</span><br>
❤️ HP: <span id="hp">100</span><br>
🔫 Weapon: <span id="weapon">1</span>
</div>

<!-- SHOP -->
<div class="shop" id="shop">
🛒 Shop<br>
<button onclick="upgrade()">Upgrade</button>
</div>

<!-- GAME OVER -->
<div class="over" id="over">
💥 GAME OVER<br>
<button class="btn" onclick="location.reload()">Restart</button>
</div>

<script>

/* 🌌 BACKGROUND */
const bg=document.getElementById("bg");
const b=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({x:Math.random()*bg.width,y:Math.random()*bg.height});
}

/* 🎮 GAME */
const c=document.getElementById("game");
const g=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

/* PLAYER */
let ship={x:c.width/2,y:c.height-120,hp:100};

let bullets=[];
let enemies=[];
let particles=[];
let boss=null;

let score=0;
let weapon=1;

/* START */
function start(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("shop").style.display="block";
}

/* CONTROL */
window.addEventListener("mousemove",e=>{
ship.x=e.clientX;
});

/* SHOOT */
window.addEventListener("click",()=>{
bullets.push({x:ship.x,y:ship.y});
});

/* ENEMY AI */
setInterval(()=>{
enemies.push({
x:Math.random()*c.width,
y:-20,
vx:(Math.random()-0.5)*2,
vy:2+Math.random()*2
});
},500);

/* BOSS */
setTimeout(()=>{
boss={x:c.width/2,y:60,hp:100};
},15000);

/* SHOP */
function upgrade(){
if(score>=10){
score-=10;
weapon++;
update();
}
}

function update(){
document.getElementById("score").innerText=score;
document.getElementById("hp").innerText=ship.hp;
document.getElementById("weapon").innerText=weapon;
}

/* EXPLOSION */
function boom(x,y){
for(let i=0;i<15;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:30
});
}
}

/* LOOP BACKGROUND */
function drawBG(){
b.clearRect(0,0,bg.width,bg.height);
b.fillStyle="white";

for(let s of stars){
s.y+=0.5;
if(s.y>bg.height)s.y=0;
b.fillRect(s.x,s.y,2,2);
}
}
setInterval(drawBG,30);

/* GAME LOOP */
function loop(){

g.clearRect(0,0,c.width,c.height);

/* ship */
g.fillStyle="#00c2ff";
g.beginPath();
g.moveTo(ship.x,ship.y);
g.lineTo(ship.x-15,ship.y+30);
g.lineTo(ship.x+15,ship.y+30);
g.fill();

/* bullets */
for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.y-=10;

g.fillStyle="white";
g.fillRect(b.x,b.y,3,10);
}

/* enemies AI */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];

e.y+=e.vy;
e.x+=e.vx;

/* draw */
g.fillStyle="red";
g.fillRect(e.x,e.y,20,20);

/* hit */
for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){
enemies.splice(i,1);
bullets.splice(j,1);

boom(e.x,e.y);

score++;
update();
break;
}
}

/* hit player */
if(e.y>ship.y && Math.abs(e.x-ship.x)<25){
ship.hp-=10;
update();

if(navigator.vibrate)navigator.vibrate(100);

if(ship.hp<=0){
document.getElementById("over").style.display="flex";
}
}
}

/* BOSS */
if(boss){
g.fillStyle="purple";
g.fillRect(boss.x,boss.y,120,50);

/* boss hit */
for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(b.x>boss.x && b.x<boss.x+120 && b.y<boss.y+50){
boss.hp--;
bullets.splice(j,1);

if(boss.hp<=0){
score+=50;
boss=null;
update();
}
}
}
}

/* particles */
for(let i=particles.length-1;i>=0;i--){
let p=particles[i];
p.x+=p.vx;
p.y+=p.vy;
p.life--;

g.fillStyle="white";
g.fillRect(p.x,p.y,2,2);

if(p.life<=0)particles.splice(i,1);
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
