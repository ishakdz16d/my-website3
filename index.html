<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7aq Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* 🌌 الخلفية */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* 🧑‍💻 التعريف */
.center {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 5;
}

.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid #00c2ff;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  backdrop-filter: blur(10px);
}

/* 🔘 أزرار */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #00c2ff;
  color: white;
  cursor: pointer;
}

/* 🎮 لعبة صغيرة */
canvas#game {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 200px;
  z-index: 2;
}

/* 🎵 زر موسيقى */
.music {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<!-- 👨‍💻 تعريف -->
<div class="center">

  <div class="card">
    <h2>👨‍💻 اسحاق</h2>
    <p>🇩🇿 من الجزائر</p>
    <p>💻 أحب البرمجة وصناعة المواقع</p>

    <button onclick="openDiscord()">💬 Discord: is7_9</button>
    <button onclick="openInstagram()">📸 Instagram: dz16d</button>
  </div>

</div>

<!-- 🎵 موسيقى -->
<button class="music" onclick="toggleMusic()">🎵 Music</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<script>

/* 🎵 موسيقى */
const music = document.getElementById("music");
let playing = false;

function toggleMusic(){
  if(!playing){
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* 🔗 روابط */
function openDiscord(){
  window.open("https://discord.com/users/is7_9","_blank");
}

function openInstagram(){
  window.open("https://instagram.com/dz16d","_blank");
}

/* 🌌 نجوم الخلفية */
const bg = document.getElementById("bg");
const btx = bg.getContext("2d");

bg.width = window.innerWidth;
bg.height = window.innerHeight;

let stars = [];

for(let i=0;i<150;i++){
  stars.push({
    x: Math.random()*bg.width,
    y: Math.random()*bg.height
  });
}

function drawBg(){
  btx.clearRect(0,0,bg.width,bg.height);

  btx.fillStyle="white";
  stars.forEach(s=>{
    btx.fillRect(s.x,s.y,1.5,1.5);
  });
}

setInterval(drawBg, 50);

/* 🎮 لعبة صغيرة */
const game = document.getElementById("game");
const ctx = game.getContext("2d");

game.width = window.innerWidth;
game.height = 200;

let shipX = game.width/2;
let enemies = [];

/* تحكم */
window.addEventListener("mousemove",e=>shipX=e.clientX);

/* أعداء */
function spawn(){
  enemies.push({
    x: Math.random()*game.width,
    y: 0,
    speed: 2
  });
}

setInterval(spawn,1000);

/* رسم */
function update(){
  ctx.clearRect(0,0,game.width,game.height);

  /* سفينة */
  ctx.fillStyle="#00c2ff";
  ctx.fillRect(shipX,160,30,20);

  /* أعداء */
  for(let i=0;i<enemies.length;i++){
    let e = enemies[i];
    e.y += e.speed;

    ctx.fillStyle="red";
    ctx.fillRect(e.x,e.y,20,20);

    if(e.y > 200){
      enemies.splice(i,1);
    }

    /* تصادم */
    if(Math.abs(e.x-shipX)<20 && e.y>150){
      alert("💥 Game Over");
      location.reload();
    }
  }

  requestAnimationFrame(update);
}

update();

/* resize */
window.addEventListener("resize",()=>{
  bg.width = window.innerWidth;
  bg.height = window.innerHeight;
  game.width = window.innerWidth;
});

</script>

</body>
</html>
