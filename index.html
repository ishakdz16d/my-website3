<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Game Profile</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* 🎮 HUD */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #00c2ff;
  backdrop-filter: blur(6px);
}

/* 🎯 Radar */
.radar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid #00c2ff;
  overflow: hidden;
  z-index: 10;
}

.radar::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: conic-gradient(from 0deg, transparent, rgba(0,194,255,0.4));
  animation: spin 3s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* 🧑‍🚀 مركز */
.center {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 5;
  text-align: center;
}

.title {
  font-size: 40px;
}

/* 📦 مربع التواصل */
.social-box {
  margin-top: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  backdrop-filter: blur(10px);
}

.social-btn {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: rgba(0,0,0,0.4);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.social-btn:hover {
  background: rgba(0,194,255,0.3);
  transform: scale(1.03);
}

/* 🎵 زر الموسيقى */
.music-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 20;
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  background: rgba(0,194,255,0.85);
  color: white;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

/* 🌌 canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<!-- HUD -->
<div class="hud">👨‍🚀 SPACE PROFILE</div>

<!-- Radar -->
<div class="radar"></div>

<!-- Center UI -->
<div class="center">

  <div class="title">🚀 Space Commander</div>
  <p>Developer Space Interface</p>

  <div class="social-box">

    <button class="social-btn" onclick="openDiscord()">
      💬 Discord: is7_9
    </button>

    <button class="social-btn" onclick="openInstagram()">
      📸 Instagram: dz16d
    </button>

  </div>

</div>

<!-- موسيقى -->
<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<script>

/* 🎵 موسيقى */
const music = document.getElementById("music");
let playing = false;

function toggleMusic(){
  if(!playing){
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* 🔗 روابط */
function openDiscord(){
  window.open("https://discord.com/users/is7_9","_blank");
}

function openInstagram(){
  window.open("https://instagram.com/dz16d","_blank");
}

/* 🌌 THREE SPACE (Canvas stars 3D effect light) */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shooting = [];
let mouse = { x: 0, y: 0 };

for(let i=0;i<250;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5
  });
}

/* 🖱️ mouse move effect */
window.addEventListener("mousemove",(e)=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

/* 🌠 shooting stars */
function shoot(){
  shooting.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height/2,
    len: 80,
    speed: 6
  });
}

setInterval(shoot,2500);

/* 🎨 draw */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* stars */
  ctx.fillStyle="white";

  stars.forEach(s=>{
    let dx = (mouse.x - canvas.width/2)*0.002;
    let dy = (mouse.y - canvas.height/2)*0.002;

    ctx.beginPath();
    ctx.arc(s.x+dx, s.y+dy, s.r, 0, Math.PI*2);
    ctx.fill();
  });

  /* shooting stars */
  for(let i=0;i<shooting.length;i++){
    let s = shooting[i];

    ctx.beginPath();
    ctx.strokeStyle="#00c2ff";
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x+s.len,s.y+s.len);
    ctx.stroke();

    s.x += s.speed;
    s.y += s.speed;

    if(s.x>canvas.width){
      shooting.splice(i,1);
    }
  }
}

function animate(){
  draw();
  requestAnimationFrame(animate);
}

animate();

/* resize */
window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
