<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7aq Profile</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
}

.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.06);
border:1px solid #00c2ff;
padding:20px;
border-radius:20px;
width:90%;
max-width:360px;
text-align:center;
backdrop-filter:blur(10px);
}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:#00c2ff;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">
<h2>👨‍💻 اسحاق</h2>
<p>🇩🇿 من الجزائر</p>
<p>💻 أحب البرمجة وصناعة المواقع</p>

<button onclick="openDiscord()">💬 Discord</button>
<button onclick="openInstagram()">📸 Instagram</button>

<button onclick="goGames()">🎮 دخول الألعاب</button>
</div>

<script>

/* روابط */
function openDiscord(){
window.open("https://discord.com/users/is7_9","_blank");
}

function openInstagram(){
window.open("https://instagram.com/dz16d","_blank");
}

function goGames(){
window.location.href="games.html";
}

/* نجوم */
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*bg.width,y:Math.random()*bg.height});
}

function draw(){
ctx.clearRect(0,0,bg.width,bg.height);
ctx.fillStyle="white";
stars.forEach(s=>ctx.fillRect(s.x,s.y,1.5,1.5));
}

setInterval(draw,50);

</script>

</body>
</html>
