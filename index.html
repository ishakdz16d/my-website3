<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسحاق | Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

body{
    margin:0;
    font-family:"Cairo", sans-serif;
    background:#05060a;
    color:white;
    overflow-x:hidden;
}

/* glow background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(138,92,255,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(255,0,120,0.10), transparent 50%);
    z-index:-1;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

nav .links a{
    margin:0 12px;
    color:#aaa;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

nav .links a:hover{
    color:white;
}

.btn-top{
    padding:10px 15px;
    border-radius:12px;
    border:1px solid #333;
    background:rgba(255,255,255,0.05);
    color:white;
}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px 80px;
    gap:40px;
}

.hero h1{
    font-size:70px;
    margin:0;
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    color:#bbb;
    max-width:450px;
    line-height:1.7;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:15px;
}

.btn{
    padding:12px 18px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
}

.btn.primary{
    background:linear-gradient(90deg,#7b61ff,#00d4ff);
    color:white;
}

.btn.secondary{
    border:1px solid #333;
    color:white;
}

/* PROFILE CARD */
.card{
    width:320px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(15px);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    border:3px solid #7b61ff;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
}

.status{
    text-align:center;
    margin-top:10px;
}
