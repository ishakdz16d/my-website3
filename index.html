<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space Site</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
}

/* 🧑‍💻 التعريف */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.06);
border:1px solid #00c2ff;
padding:20px;
border-radius:20px;
width:90%;
max-width:350px;
text-align:center;
backdrop-filter:blur(10px);
z-index:10;
}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:#00c2ff;
color:white;
cursor:pointer;
}

/* 🎮 HUD */
.hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border:1px solid #00c2ff;
border-radius:10px;
display:none;
z-index:20;
}

/* 🎮 Canvas */
#game{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🧑‍💻 -->
<div class="card" id="menu">
<h2>👨‍💻 اسحاق</h2>
<p>🇩🇿 من الجزائر</p>
<p>💻 أحب البرمجة وصناعة الألعاب</p>

<button onclick="startGame()">🚀 تشغيل لعبة الفضاء</button>
</div>

<!-- ⭐ HUD -->
<div class="hud" id="hud">
⭐ Score: <span id="score">0</span>
</div>

<!-- 🎮 GAME -->
<canvas id="game"></canvas>

<script>

/* 🌌 الخلفية */
const bg=document.getElementById("bg");
const bctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*bg.width,
y:Math.random()*bg.height
});
}

function drawBg(){
bctx.clearRect(0,0,bg.width,bg.height);
bctx.fillStyle="white";
stars.forEach(s=>{
bctx.fillRect(s.x,s.y,1.5,1.5);
});
}
setInterval(drawBg,50);

/* 🎮 GAME */
const game=document.getElementById("game");
const g=game.getContext("2d");

game.width=innerWidth;
game.height=innerHeight;

/* player */
let ship={x:game.width/2,y:game.height-120};

let bullets=[];
let enemies=[];

let score=0;

/* 🚀 start */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
game.style.display="block";
}

/* 🎯 control */
window.addEventListener("mousemove",e=>{
ship.x=e.clientX;
});

/* 🔫 shoot */
window.addEventListener("click",()=>{
if(game.style.display==="block"){
bullets.push({x:ship.x,y:ship.y});
}
});

/* 🛸 enemies */
setInterval(()=>{
if(game.style.display==="block"){
enemies.push({
x:Math.random()*game.width,
y:-20,
s:2
});
}
},800);

/* 🎮 loop */
function loop(){

if(game.style.display==="block"){

g.clearRect(0,0,game.width,game.height);

/* 🚀 ship */
g.fillStyle="#00c2ff";
g.fillRect(ship.x,ship.y,30,20);

/* bullets */
for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.y-=7;

g.fillStyle="white";
g.fillRect(b.x,b.y,3,10);
}

/* enemies */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=e.s;

g.fillStyle="red";
g.fillRect(e.x,e.y,20,20);

/* collision */
for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

enemies.splice(i,1);
bullets.splice(j,1);

score++;
document.getElementById("score").innerText=score;
break;
}
}

/* game over */
if(e.y>game.height-100 && Math.abs(e.x-ship.x)<20){
alert("💥 Game Over | Score: "+score);
location.reload();
}
}
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
