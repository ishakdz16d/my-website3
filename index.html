<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is7_9 — Portfolio</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* 🌌 background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(100,150,255,0.06), transparent 50%);
    z-index: -2;
}

/* 🖱️ cursor */
#cursor {
    position: fixed;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* 🧭 layout */
section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 10vw;
}

h1 {
    font-size: clamp(50px, 7vw, 120px);
    font-weight: 500;
    letter-spacing: -3px;
    margin: 0;
}

p {
    max-width: 650px;
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    margin-top: 20px;
}

/* buttons */
a {
    margin-top: 20px;
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

a:hover {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div id="cursor"></div>

<section>
    <h1 id="title"></h1>
    <p>Creative Web Developer building immersive digital experiences.</p>
    <a href="https://github.com/ishakdz16d" target="_blank">GitHub</a>
</section>

<section>
    <h1>About</h1>
    <p>I focus on clean UI, modern animations, and performance-first web development.</p>
</section>

<section>
    <h1>Projects</h1>
    <p>Apple-style UI • WebGL scenes • Interactive portfolios</p>
</section>

<section>
    <h1>Contact</h1>
    <p>Discord: is7_9</p>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<script>

/* ✍️ type animation */
const text = "Is7_9";
let i = 0;

(function type(){
    if(i < text.length){
        document.getElementById("title").innerHTML += text[i];
        i++;
        setTimeout(type,120);
    }
})();

/* 🖱️ cursor */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

/* 🎬 scroll animation */
gsap.registerPlugin(ScrollTrigger);

gsap.utils.toArray("section").forEach(sec=>{
    gsap.from(sec,{
        opacity:0,
        y:80,
        duration:1,
        scrollTrigger:{
            trigger:sec,
            start:"top 80%",
            toggleActions:"play none none reverse"
        }
    });
});

</script>

</body>
</html>
