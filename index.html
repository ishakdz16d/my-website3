<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Space</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

/* النجوم */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* الواجهة */
.content {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* بطاقة المبرمج */
.card {
  background: rgba(255,255,255,0.06);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  width: 90%;
  max-width: 380px;
  margin-top: 15px;
  border: 1px solid rgba(255,255,255,0.2);
}

h1 {
  font-size: 38px;
}

.sub {
  opacity: 0.8;
}

/* أزرار */
button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  background: #00c2ff;
  color: white;
  cursor: pointer;
}

/* مهارات */
.skills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
}

.skill {
  background: rgba(0,194,255,0.2);
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
}

/* روابط */
.social {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  padding: 8px;
  border-radius: 12px;
}

.box img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

/* موبايل */
@media (max-width: 600px) {
  h1 { font-size: 28px; }
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<div class="content">

<h1>👨‍💻 مبرمج فضائي</h1>
<p class="sub">Developer | Coder | Explorer</p>

<button onclick="toggleMusic()">▶ تشغيل الموسيقى</button>

<!-- بطاقة -->
<div class="card">

  <p>🔥 عني:</p>
  <p class="sub">مبرمج يحب بناء مواقع وتطبيقات داخل عوالم خيالية</p>

  <p>⚡ المهارات:</p>
  <div class="skills">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">GitHub</div>
    <div class="skill">Frontend</div>
  </div>

</div>

<!-- روابط -->
<div class="social">

  <div class="box">
    <img src="https://placekitten.com/80/80">
    <button onclick="openDiscord()">💬 is7_9</button>
  </div>

  <div class="box">
    <img src="https://placekitten.com/81/81">
    <button onclick="openInstagram()">📸 dz16d</button>
  </div>

</div>

</div>

<!-- موسيقى -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b3b3b7f3a.mp3">
</audio>

<script>

/* موسيقى */
const music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}

/* روابط */
function openDiscord() {
  window.open("https://discord.com/users/is7_9", "_blank");
}

function openInstagram() {
  window.open("https://instagram.com/dz16d", "_blank");
}

/* نجوم */
const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let shooting = [];

for (let i = 0; i < 180; i++) {
  stars.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5
  });
}

function createShoot() {
  shooting.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight / 2,
    len: 70,
    speed: 6
  });
}

setInterval(createShoot, 3000);

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  for (let i = 0; i < shooting.length; i++) {
    let s = shooting[i];

    ctx.beginPath();
    ctx.strokeStyle = "white";
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.len, s.y + s.len);
    ctx.stroke();

    s.x += s.speed;
    s.y += s.speed;

    if (s.x > canvas.width) {
      shooting.splice(i,1);
    }
  }
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
