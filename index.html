<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS7AQ SPACE GAME</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

/* 🌌 BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
}

/* ===== MENU ===== */
#menu{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#0a0a2a,#000);
text-align:center;
z-index:10;
}

h1{
color:#00c2ff;
text-shadow:0 0 20px #00c2ff;
}

a{
display:block;
margin:6px;
padding:10px;
width:200px;
border:1px solid #00c2ff;
border-radius:10px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.05);
}

button{
margin-top:10px;
padding:12px 25px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00c2ff,#0044ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* ===== HUD ===== */
#hud{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border:1px solid #00c2ff;
border-radius:10px;
display:none;
z-index:20;
}

/* UPGRADE */
#upgrade{
position:fixed;
top:10px;
right:10px;
background:rgba(0,0,0,0.5);
border:1px solid #00c2ff;
padding:10px;
border-radius:10px;
display:none;
z-index:20;
}

/* GAME OVER */
#over{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.9);
z-index:30;
font-size:30px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="game"></canvas>

<!-- 🧑‍💻 MENU -->
<div id="menu">
<h1>🚀 IS7AQ SPACE</h1>

<a href="#" onclick="alert('Discord: is7_9')">💬 Discord</a>
<a href="#" onclick="alert('Instagram: dz16d')">📸 Instagram</a>

<button onclick="startGame()">▶ Start Game</button>
</div>

<!-- HUD -->
<div id="hud">
❤️ Lives: <span id="lives">3</span><br>
⭐ Score: <span id="score">0</span><br>
🔫 Power: <span id="power">1</span>
</div>

<!-- UPGRADE -->
<div id="upgrade">
<button onclick="upgrade()">🔫 Upgrade (10⭐)</button>
</div>

<!-- GAME OVER -->
<div id="over">
💥 GAME OVER<br>
<button onclick="location.reload()">Restart</button>
</div>

<script>

/* 🌌 BACKGROUND */
const bg=document.getElementById("bg");
const b=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({x:Math.random()*bg.width,y:Math.random()*bg.height});
}

function draw(){
b.clearRect(0,0,bg.width,bg.height);
b.fillStyle="white";

for(let s of stars){
s.y+=0.5;
if(s.y>bg.height)s.y=0;
b.fillRect(s.x,s.y,2,2);
}
}
setInterval(draw,30);

/* 🎮 GAME */
const c=document.getElementById("game");
const g=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

/* PLAYER */
let ship={x:c.width/2,y:c.height-120};

let bullets=[];
let enemies=[];

let lives=3;
let score=0;
let power=1;

/* START GAME → SWITCH SCREENS */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("upgrade").style.display="block";
}

/* CONTROL */
window.addEventListener("mousemove",e=>{
ship.x=e.clientX;
});

/* SHOOT */
window.addEventListener("click",()=>{
bullets.push({x:ship.x,y:ship.y});
});

/* ENEMIES */
setInterval(()=>{
enemies.push({
x:Math.random()*c.width,
y:-20,
speed:2+Math.random()*2
});
},500);

/* UPGRADE */
function upgrade(){
if(score>=10){
score-=10;
power++;
update();
}
}

/* UPDATE */
function update(){
document.getElementById("lives").innerText=lives;
document.getElementById("score").innerText=score;
document.getElementById("power").innerText=power;
}

/* LOOP */
function loop(){

g.clearRect(0,0,c.width,c.height);

/* SHIP */
g.fillStyle="#00c2ff";
g.beginPath();
g.moveTo(ship.x,ship.y);
g.lineTo(ship.x-15,ship.y+30);
g.lineTo(ship.x+15,ship.y+30);
g.fill();

/* BULLETS */
for(let i=bullets.length-1;i>=0;i--){
let b=bullets[i];
b.y-=10;

g.fillStyle="white";
g.fillRect(b.x,b.y,3,10);
}

/* ENEMIES */
for(let i=enemies.length-1;i>=0;i--){
let e=enemies[i];
e.y+=e.speed;

g.fillStyle="red";
g.fillRect(e.x,e.y,25,20);

/* HIT */
for(let j=bullets.length-1;j>=0;j--){
let b=bullets[j];

if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20){

enemies.splice(i,1);
bullets.splice(j,1);

score++;
update();
break;
}
}

/* PLAYER HIT */
if(e.y>ship.y && Math.abs(e.x-ship.x)<25){

enemies.splice(i,1);
lives--;
update();

if(lives<=0){
document.getElementById("over").style.display="flex";
}
}
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
